name: Deploy

on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      environment:
        description: 'Target environment'
        required: true
        default: 'staging'
        type: choice
        options: [staging, production]

permissions:
  contents: read

concurrency:
  group: deploy-${{ github.ref }}
  cancel-in-progress: true

env:
  AWS_REGION: us-east-1
  PROD_STACK:    secure-static-site
  STAGING_STACK: secure-static-site-staging

# ─────────────────────────────────────────────────────────────────────────────
# PIPELINE OVERVIEW
#
#  [lint] → [security-scan] → [deploy-staging] → [smoke-staging]
#                                                       ↓
#                                             [approve-production]  ← manual gate
#                                                       ↓
#                                             [deploy-production] → [smoke-production]
#                                                       ↓
#                                             [security-header-audit]
#
# The manual gate is enforced by a GitHub Environment protection rule on the
# 'production' environment. Set this up in:
#   Repo → Settings → Environments → production → Required reviewers
# ─────────────────────────────────────────────────────────────────────────────

jobs:

  # ── STAGE 1: Lint ────────────────────────────────────────────────
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: pip

      - name: Install cfn-lint
        run: pip install cfn-lint

      - name: Lint templates
        run: |
          cfn-lint infrastructure/template.yaml --include-checks W
          cfn-lint infrastructure/oidc-bootstrap.yaml --include-checks W

      - name: Validate against AWS API
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}
          role-session-name: GitHubActions-Lint-${{ github.run_id }}

      - name: AWS template validation
        run: |
          aws cloudformation validate-template \
            --template-body file://infrastructure/template.yaml \
            --region ${{ env.AWS_REGION }}

  # ── STAGE 2: Security Scan ───────────────────────────────────────
  # Runs cfn-nag and checkov in parallel. Both must pass before any
  # deployment happens. This is the security gate.
  security-scan:
    name: Security Scan
    runs-on: ubuntu-latest
    needs: lint
    permissions:
      contents: read
      security-events: write   # Required for SARIF upload

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: pip

      - name: Install scanners
        run: |
          pip install checkov
          gem install cfn-nag

      - name: Run cfn-nag
        run: |
          cfn_nag_scan \
            --input-path infrastructure/template.yaml \
            --output-format json | tee cfn-nag-results.json
          # Fail if any FAILURES (not warnings) found
          FAILURES=$(python3 -c "
          import json,sys
          try:
              data = json.loads(open('cfn-nag-results.json').read())
              fails = [v for f in data
                         for v in f.get('file_results',{}).get('violations',[])
                         if v.get('type') == 'FAIL']
              print(len(fails))
              if fails:
                  for f in fails:
                      print(f'FAIL [{f[\"id\"]}]: {f[\"message\"]}', file=sys.stderr)
          except Exception as e:
              print(f'Parse error: {e}', file=sys.stderr)
              print(0)
          ")
          echo "cfn-nag FAILURES: $FAILURES"
          [ "$FAILURES" -eq 0 ] || exit 1

      - name: Run checkov
        run: |
          checkov \
            --directory infrastructure/ \
            --framework cloudformation \
            --config-file .checkov.yaml \
            --output cli \
            --output sarif \
            --output-file-path console,checkov-results.sarif

      - name: Upload SARIF to Security tab
        uses: github/codeql-action/upload-sarif@v3
        if: always()
        with:
          sarif_file: checkov-results.sarif
          category: checkov-deploy

  # ── STAGE 3: Deploy to Staging ───────────────────────────────────
  # Deploys an identical copy of the stack with a staging-specific
  # name. This validates that the CloudFormation template deploys
  # cleanly before touching production. Uses the same OIDC role.
  deploy-staging:
    name: Deploy → Staging
    runs-on: ubuntu-latest
    needs: [lint, security-scan]
    environment: staging    # Maps to GitHub Environment (no protection rules needed)
    permissions:
      id-token: write
      contents: read

    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}
          role-session-name: GitHubActions-Staging-${{ github.run_id }}

      - name: Deploy staging stack
        run: |
          aws cloudformation deploy \
            --template-file infrastructure/template.yaml \
            --stack-name ${{ env.STAGING_STACK }} \
            --parameter-overrides \
                DomainName=${{ secrets.DOMAIN_NAME }} \
                SubDomain=www \
                Environment=staging \
                RateLimitThreshold=500 \
            --capabilities CAPABILITY_NAMED_IAM \
            --no-fail-on-empty-changeset \
            --tags \
                Project=secure-static-site \
                Environment=staging \
                ManagedBy=GitHubActions \
                CommitSha=${{ github.sha }}

      - name: Sync staging website content
        run: |
          BUCKET=$(aws cloudformation describe-stacks \
            --stack-name ${{ env.STAGING_STACK }} \
            --query "Stacks[0].Outputs[?OutputKey=='ContentBucketName'].OutputValue" \
            --output text)
          DIST_ID=$(aws cloudformation describe-stacks \
            --stack-name ${{ env.STAGING_STACK }} \
            --query "Stacks[0].Outputs[?OutputKey=='CloudFrontDistributionId'].OutputValue" \
            --output text)

          aws s3 sync website/ s3://$BUCKET/ \
            --exclude "*.html" \
            --cache-control "public, max-age=31536000, immutable" \
            --delete
          aws s3 sync website/ s3://$BUCKET/ \
            --include "*.html" \
            --cache-control "public, max-age=300, must-revalidate" \
            --delete

          aws cloudfront create-invalidation \
            --distribution-id $DIST_ID \
            --paths "/*"

      - name: Export staging URL
        id: staging-url
        run: |
          URL=$(aws cloudformation describe-stacks \
            --stack-name ${{ env.STAGING_STACK }} \
            --query "Stacks[0].Outputs[?OutputKey=='CloudFrontDomainName'].OutputValue" \
            --output text)
          echo "url=https://$URL" >> $GITHUB_OUTPUT
          echo "🔗 Staging URL: https://$URL"

    outputs:
      staging_url: ${{ steps.staging-url.outputs.url }}

  # ── STAGE 4: Smoke Test Staging ──────────────────────────────────
  smoke-staging:
    name: Smoke Test → Staging
    runs-on: ubuntu-latest
    needs: deploy-staging

    steps:
      - name: Wait for CloudFront propagation
        run: sleep 20

      - name: HTTP availability check
        run: |
          URL="${{ needs.deploy-staging.outputs.staging_url }}"
          echo "Testing: $URL"
          for i in 1 2 3; do
            STATUS=$(curl -s -o /dev/null -w "%{http_code}" --max-time 15 "$URL")
            echo "Attempt $i: HTTP $STATUS"
            [ "$STATUS" = "200" ] && echo "✅ Staging smoke test passed" && exit 0
            sleep 10
          done
          echo "❌ Staging smoke test failed after 3 attempts"
          exit 1

      - name: Security headers present on staging
        run: |
          URL="${{ needs.deploy-staging.outputs.staging_url }}"
          HEADERS=$(curl -sI "$URL")
          FAILED=0
          for HEADER in \
            "strict-transport-security" \
            "x-content-type-options" \
            "x-frame-options" \
            "content-security-policy" \
            "referrer-policy" \
            "permissions-policy"; do
            if echo "$HEADERS" | grep -qi "$HEADER"; then
              echo "✅ $HEADER"
            else
              echo "❌ MISSING: $HEADER"
              FAILED=1
            fi
          done
          [ "$FAILED" -eq 0 ] || exit 1

  # ── STAGE 5: Approve Production ──────────────────────────────────
  # This job does nothing itself — it exists purely to invoke the
  # 'production' GitHub Environment, which has Required Reviewers set.
  # The pipeline pauses here until an approved reviewer clicks
  # "Approve and deploy" in the GitHub Actions UI.
  #
  # Setup: Repo → Settings → Environments → production → Required reviewers
  approve-production:
    name: Approve → Production
    runs-on: ubuntu-latest
    needs: smoke-staging
    environment: production   # ← This is the manual gate
    steps:
      - name: Approved
        run: echo "✅ Production deployment approved by ${{ github.actor }}"

  # ── STAGE 6: Deploy to Production ────────────────────────────────
  deploy-production:
    name: Deploy → Production
    runs-on: ubuntu-latest
    needs: approve-production
    environment: production
    permissions:
      id-token: write
      contents: read

    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}
          role-session-name: GitHubActions-Prod-${{ github.run_id }}

      - name: Deploy production stack
        run: |
          aws cloudformation deploy \
            --template-file infrastructure/template.yaml \
            --stack-name ${{ env.PROD_STACK }} \
            --parameter-overrides \
                DomainName=${{ secrets.DOMAIN_NAME }} \
                SubDomain=www \
                Environment=prod \
                RateLimitThreshold=2000 \
            --capabilities CAPABILITY_NAMED_IAM \
            --no-fail-on-empty-changeset \
            --tags \
                Project=secure-static-site \
                Environment=prod \
                ManagedBy=GitHubActions \
                CommitSha=${{ github.sha }}

      - name: Sync production website content
        id: sync
        run: |
          BUCKET=$(aws cloudformation describe-stacks \
            --stack-name ${{ env.PROD_STACK }} \
            --query "Stacks[0].Outputs[?OutputKey=='ContentBucketName'].OutputValue" \
            --output text)
          DIST_ID=$(aws cloudformation describe-stacks \
            --stack-name ${{ env.PROD_STACK }} \
            --query "Stacks[0].Outputs[?OutputKey=='CloudFrontDistributionId'].OutputValue" \
            --output text)

          aws s3 sync website/ s3://$BUCKET/ \
            --exclude "*.html" \
            --cache-control "public, max-age=31536000, immutable" \
            --delete
          aws s3 sync website/ s3://$BUCKET/ \
            --include "*.html" \
            --cache-control "public, max-age=300, must-revalidate" \
            --delete

          INVALIDATION_ID=$(aws cloudfront create-invalidation \
            --distribution-id $DIST_ID \
            --paths "/*" \
            --query 'Invalidation.Id' \
            --output text)

          aws cloudfront wait invalidation-completed \
            --distribution-id $DIST_ID \
            --id $INVALIDATION_ID

          echo "dist_id=$DIST_ID" >> $GITHUB_OUTPUT

      - name: Export production URL
        id: prod-url
        run: |
          URL=$(aws cloudformation describe-stacks \
            --stack-name ${{ env.PROD_STACK }} \
            --query "Stacks[0].Outputs[?OutputKey=='CloudFrontDomainName'].OutputValue" \
            --output text)
          echo "url=https://$URL" >> $GITHUB_OUTPUT

    outputs:
      prod_url: ${{ steps.prod-url.outputs.url }}

  # ── STAGE 7: Smoke Test + Security Audit Production ──────────────
  smoke-production:
    name: Smoke Test → Production
    runs-on: ubuntu-latest
    needs: deploy-production

    steps:
      - name: HTTP availability check
        run: |
          URL="${{ needs.deploy-production.outputs.prod_url }}"
          echo "Testing: $URL"
          for i in 1 2 3; do
            STATUS=$(curl -s -o /dev/null -w "%{http_code}" --max-time 15 "$URL")
            echo "Attempt $i: HTTP $STATUS"
            [ "$STATUS" = "200" ] && echo "✅ Production smoke test passed" && exit 0
            sleep 10
          done
          echo "❌ Production smoke test failed"
          exit 1

      - name: Full security header audit
        run: |
          URL="${{ needs.deploy-production.outputs.prod_url }}"
          HEADERS=$(curl -sI "$URL")
          FAILED=0

          check() {
            NAME=$1; EXPECTED=$2
            VALUE=$(echo "$HEADERS" | grep -i "^$NAME:" | cut -d: -f2- | xargs)
            if echo "$VALUE" | grep -qi "$EXPECTED"; then
              echo "✅ $NAME: $VALUE"
            else
              echo "❌ $NAME — expected '$EXPECTED', got: '$VALUE'"
              FAILED=1
            fi
          }

          check "strict-transport-security"  "max-age"
          check "x-content-type-options"     "nosniff"
          check "x-frame-options"            "DENY"
          check "content-security-policy"    "default-src"
          check "referrer-policy"            "strict-origin"
          check "permissions-policy"         "camera"

          [ "$FAILED" -eq 0 ] || { echo "❌ Security audit failed"; exit 1; }
          echo "✅ All security headers verified on production"
